# ==============================================================================
# RZ vs RZK snMultiome Pipeline Configuration
# Paper: "Epithelial WNT secretion drives niche escape of developing gastric cancer"
# ==============================================================================

# --- Sample information -------------------------------------------------------
# Each sample needs: h5 file, fragment file, and per-barcode metrics CSV
# All paths are relative to the /input mount point
samples:
  wild:
    h5: "Mouse_RZ_WEN/filtered_feature_bc_matrix.h5"
    fragments: "Mouse_RZ_WEN/atac_fragments.tsv.gz"
    metadata: "Mouse_RZ_WEN/per_barcode_metrics.csv"
    genotype: "Wild_type"
  mutant:
    h5: "Mouse_RZK_WEN/filtered_feature_bc_matrix.h5"
    fragments: "Mouse_RZK_WEN/atac_fragments.tsv.gz"
    metadata: "Mouse_RZK_WEN/per_barcode_metrics.csv"
    genotype: "Mutant"

# --- Species / genome ---------------------------------------------------------
species: "mouse"          # "mouse" (mm10) or "human" (hg38)

# --- QC thresholds ------------------------------------------------------------
qc:
  nCount_ATAC_min: 1000
  nCount_ATAC_max: 100000
  nCount_RNA_min: 1000
  nCount_RNA_max: 25000
  nucleosome_signal_max: 2
  TSS_enrichment_min: 1
  percent_mt_max: 15

# --- RNA processing -----------------------------------------------------------
rna:
  n_variable_features: 2000   # for FindVariableFeatures (vst)

# --- Clustering ---------------------------------------------------------------
clustering:
  npcs: 30                     # PCA dimensions
  dims: 30                     # dims used for UMAP / neighbors
  resolution_initial: 0.3      # first pass (6 clusters)
  resolution_refine: 0.6       # second pass to split Pit sub-cluster
  algorithm: 1                 # Louvain

# --- Differential expression --------------------------------------------------
de:
  test_use: "MAST"
  padj_threshold: 0.01
  log2fc_threshold: 1

# --- Differential accessibility -----------------------------------------------
da:
  min_pct: 0.05
  logfc_threshold: 0.1
  test_use: "LR"
  latent_vars: "atac_peak_region_fragments"
  padj_threshold_motif: 0.005  # for motif enrichment input

# --- Wnt7b regulatory regions for ATAC enrichment tests -----------------------
wnt7b_regions:
  - "chr15-85568400-85569900"
  - "chr15-85574150-85575200"

# --- Parallelisation ----------------------------------------------------------
threads: 20
max_memory_gb: 80

# --- MACS2 path (inside the Docker container) ---------------------------------
macs2_path: "/opt/conda/bin/macs2"