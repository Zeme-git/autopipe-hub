# Gastric WNT snMultiome Pipeline — Configuration

samples:
  Wild_type:
    h5:        "/input/Mouse_RZ_WEN/filtered_feature_bc_matrix.h5"
    fragments: "/input/Mouse_RZ_WEN/atac_fragments.tsv.gz"
    metadata:  "/input/Mouse_RZ_WEN/per_barcode_metrics.csv"
    genotype:  "Wild_type"
  Mutant:
    h5:        "/input/Mouse_RZK_WEN/filtered_feature_bc_matrix.h5"
    fragments: "/input/Mouse_RZK_WEN/atac_fragments.tsv.gz"
    metadata:  "/input/Mouse_RZK_WEN/per_barcode_metrics.csv"
    genotype:  "Mutant"

species: "mouse"
macs2_path: "/opt/conda/envs/pipeline/bin/macs2"

qc:
  nCount_ATAC_min: 1000
  nCount_ATAC_max: 100000
  nCount_RNA_min:  1000
  nCount_RNA_max:  25000
  nucleosome_signal_max: 2
  TSS_enrichment_min:    1
  percent_mt_max:        15

rna:
  nfeatures: 2000

integration:
  npcs: 30
  cluster_resolution_coarse: 0.3
  cluster_resolution_fine:   0.6
  algorithm: 1

de:
  test_use: "MAST"
  padj_threshold: 0.01
  log2fc_threshold: 1

da:
  min_pct: 0.05
  logfc_threshold: 0.1
  test_use: "LR"
  latent_vars: "atac_peak_region_fragments"
  padj_threshold_motif: 0.005

wnt7b_regions:
  - "chr15-85568400-85569900"
  - "chr15-85574150-85575200"

cluster_names:
  "0": "Neck"
  "1": "Lgr5+"
  "2": "SPEM"
  "3": "Wnt7+"
  "4": "Proliferating"
  "5": "Pre-Pit"
  "6": "Pit"

marker_genes:
  - "Lgr5"
  - "Glipr1"
  - "Cd44"
  - "Cftr"
  - "Muc6"
  - "Mki67"
  - "Foxm1"
  - "Hmgb2"
  - "Top2a"
  - "Smc2"
  - "Gkn1"
  - "Tff1"
  - "Gkn2"
  - "Muc5ac"
  - "Wnt7b"

featureplot_genes:
  - { gene: "Muc5ac", min: 0,   max: 3   }
  - { gene: "Gkn2",   min: 0,   max: 3   }
  - { gene: "Tff1",   min: 0.5, max: 6   }
  - { gene: "Gkn1",   min: 0.5, max: 5   }
  - { gene: "Smc2",   min: 0.5, max: 3   }
  - { gene: "Top2a",  min: 0.5, max: 4   }
  - { gene: "Hmgb2",  min: 1,   max: 4   }
  - { gene: "Foxm1",  min: 0,   max: 2   }
  - { gene: "Mki67",  min: 0.3, max: 3   }
  - { gene: "Muc6",   min: 0.3, max: 4.5 }
  - { gene: "Cftr",   min: 0.5, max: 3.5 }
  - { gene: "Cd44",   min: 2,   max: 4.2 }
  - { gene: "Glipr1", min: 1.5, max: 4.5 }
  - { gene: "Lgr5",   min: 0.5, max: 3.5 }

wnt_family_genes:
  - "Wnt1"
  - "Wnt2"
  - "Wnt2b"
  - "Wnt3"
  - "Wnt3a"
  - "Wnt4"
  - "Wnt5a"
  - "Wnt5b"
  - "Wnt6"
  - "Wnt7a"
  - "Wnt7b"
  - "Wnt8a"
  - "Wnt8b"
  - "Wnt9a"
  - "Wnt9b"
  - "Wnt10a"
  - "Wnt10b"
  - "Wnt11"
  - "Wnt16"

threads: 20
max_memory_gb: 80
output_dir: "/output"